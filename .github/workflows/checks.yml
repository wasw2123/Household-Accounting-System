name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  # 1단계: 코드 품질 검사 (린트/테스트)
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Packages & Libraries
        run: |
          uv sync --all-groups

      - name: Run ruff (Linting)
        run: |
          uv run ruff check .

      - name: Run Django Migration
        env:
          DJANGO_SETTINGS_MODULE: config.setting.base
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          uv run python manage.py migrate

      - name: Run Django Tests
        env:
          DJANGO_SETTINGS_MODULE: config.setting.base
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          uv run python manage.py test

  # 2단계: Docker 이미지 빌드 & Docker Hub 푸시
  # develop/main push 시에만 실행 (PR은 제외)
  build:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build --platform=linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/household-accounting:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/household-accounting:latest

  # 3단계: EC2 자동 배포 (무중단 롤링 배포)
  # build 성공 후 실행
  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copy deployment files to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          # 배포 디렉토리 생성
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER@$HOST \
            "mkdir -p ~/household-accounting/nginx ~/household-accounting/scripts"

          # docker-compose.prod.yml 전송
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            docker-compose.prod.yml \
            $USER@$HOST:~/household-accounting/

          # nginx 설정 전송
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            nginx/nginx.conf \
            $USER@$HOST:~/household-accounting/nginx/

          # 배포 스크립트 전송
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            scripts/deploy.sh \
            $USER@$HOST:~/household-accounting/scripts/

      - name: Run rolling deploy on EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER@$HOST << EOF
            # .env에 DOCKER_USERNAME 주입 (없으면 추가)
            if ! grep -q "^DOCKER_USERNAME=" ~/household-accounting/.env 2>/dev/null; then
              echo "DOCKER_USERNAME=$DOCKER_USERNAME" >> ~/household-accounting/.env
            else
              sed -i "s|^DOCKER_USERNAME=.*|DOCKER_USERNAME=$DOCKER_USERNAME|" ~/household-accounting/.env
            fi

            # 배포 스크립트 실행
            chmod +x ~/household-accounting/scripts/deploy.sh
            ~/household-accounting/scripts/deploy.sh
          EOF
