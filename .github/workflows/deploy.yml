name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    # Build & Push가 성공했을 때만 실행
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        env:
          PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER@$HOST << EOF
            # 최신 이미지 pull
            docker pull $DOCKER_USERNAME/household-accounting:latest

            # 기존 컨테이너 중지 및 제거
            docker stop household_container || true
            docker rm household_container || true

            # 새 컨테이너 실행 (.env 파일은 EC2에 미리 준비되어 있어야 함)
            docker run -d \
              --name household_container \
              -p 8000:8000 \
              --env-file ~/household-accounting/.env \
              --restart unless-stopped \
              $DOCKER_USERNAME/household-accounting:latest
          EOF
