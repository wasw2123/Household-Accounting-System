services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles
    depends_on:
      web:
        condition: service_healthy

  web:
    image: ${DOCKER_USERNAME}/household-accounting:latest
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.setting.prod
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  staticfiles:
  redis_data:
